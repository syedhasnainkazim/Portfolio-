<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="skGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#b060f7"/>
      <stop offset="45%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark navy background -->
  <rect width="64" height="64" rx="14" fill="#080818"/>

  <!-- Purple background glow -->
  <ellipse cx="32" cy="32" rx="20" ry="14" fill="#7c3aed" opacity="0.22" filter="url(#softGlow)"/>

  <!-- {SK} rendered as path-based text for crisp favicon rendering -->
  <text
    x="32" y="44"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="31"
    font-weight="800"
    fill="url(#skGrad)"
    filter="url(#glow)"
    letter-spacing="-0.5"
  >{SK}</text>
</svg>
